[tool.ruff]
line-length = 95
exclude = ['alembic']

[tool.ruff.lint]
extend-select = ["E501"]

[tool.pytest]
addopts = ["-v"]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_test_loop_scope = "session"
asyncio_default_fixture_loop_scope = "session"
strict_markers = true
python_files = ["tests.py", "test_*.py", "*_test.py"]
markers = ["slow"]
